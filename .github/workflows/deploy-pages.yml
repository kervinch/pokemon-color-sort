name: Deploy static site to GitHub Pages

# Publishes the repo root (index.html redirects to viewer/) as a static site.
# Uses the official GitHub Pages Actions flow — no Jekyll build, files served as-is.

on:
  push:
    branches: [main]
  workflow_dispatch:

# Least-privilege permissions the deploy-pages action needs.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; don't cancel an in-progress production deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Whole repo root — the static viewer plus its assets. The extra
          # source files (pipeline/, data/) are harmless and just not linked.
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
